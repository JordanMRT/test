<html><head><style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,700;9..144,900&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

#sc{
  width:100%;height:100%;position:relative;overflow:hidden;
  font-family:'DM Mono',monospace;
  background:#D4C8B8;
  transition:background 2s ease;
}
#sc.night{ background:#1E1A2E }

/* WALL */
#wall{
  position:absolute;inset:0 0 168px 0;
  background:#D9CEBF;
  transition:background 2s ease;
}
#sc.night #wall{ background: #2b2011; }

/* subtle grid texture */
#wallTex{
  position:absolute;inset:0 0 168px 0;
  background-image:
    repeating-linear-gradient(90deg,rgba(0,0,0,.018) 0,rgba(0,0,0,.018) 1px,transparent 1px,transparent 44px),
    repeating-linear-gradient(0deg,rgba(0,0,0,.014) 0,rgba(0,0,0,.014) 1px,transparent 1px,transparent 44px);
  pointer-events:none;
  transition:opacity 2s;
}
#sc.night #wallTex{ opacity:.15 }

/* FLOOR */
#floor{
  position:absolute;bottom:0;left:0;right:0;height:172px;
  background:#C2A882;
  transition:background 2s ease;
}
#sc.night #floor{ background: #42392c;}

#floorPlanks{
  position:absolute;bottom:0;left:0;right:0;height:172px;
  background-image:repeating-linear-gradient(90deg,transparent,transparent 119px,rgba(0,0,0,.06) 119px,rgba(0,0,0,.06) 120px);
  pointer-events:none;
}
#baseboard{
  position:absolute;bottom:168px;left:0;right:0;height:7px;
  background:#A08060;
  transition:background 2s;
}
#sc.night #baseboard{     background: #1a0f05; }

/* ── WINDOW ── */
#winWrap{
      position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 560px;
    height: 345px;
    z-index: 3;
}
#winSky{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#7EC8E3 0%,#B8DFF0 55%,#D8F0FA 100%);
  overflow:hidden;
  transition:background 2s ease;
}
#sc.night #winSky{
  background:linear-gradient(180deg,#1A0E2E 0%,#2A1850 40%,#1C2444 100%);
}

/* clouds container — scrolls horizontally */
#cloudsTrack{
  position:absolute;top:0;left:0;width:600px;height:100%;
  animation:cloudScroll 28s linear infinite;
}
@keyframes cloudScroll{
  from{transform:translateX(0)}
  to{transform:translateX(-300px)}
}
.cld{
  position:absolute;background:rgba(255,255,255,.88);border-radius:20px;
  transition:opacity 2s;
}
#sc.night .cld{opacity:0}

/* stars */
.star{
  position:absolute;background:#fff;border-radius:50%;
  opacity:0;transition:opacity 2.2s;
}
#sc.night .star{opacity:.9}

/* moon */
#moon{
  position:absolute;top:18px;right:22px;
  width:26px;height:26px;border-radius:50%;
  background:#EDE8C0;
  box-shadow:0 0 12px 4px rgba(237,232,192,.35);
  opacity:0;transition:opacity 2.2s;
}
#sc.night #moon{opacity:1}

/* window frame */
#winFrame{
  position:absolute;inset:0;
  border:7px solid #8B6B4A;pointer-events:none;z-index:1;
}
#winFrame::before{
  content:'';position:absolute;top:50%;left:0;right:0;
  height:6px;background:#8B6B4A;transform:translateY(-50%);
}
#winFrame::after{
  content:'';position:absolute;left:50%;top:0;bottom:0;
  width:6px;background:#8B6B4A;transform:translateX(-50%);
}
/* sill */
#winSill{
  position: absolute;
    top: 371px;
    left: 50%;
    transform: translateX(-50%);
    width: 570px;
    height: 10px;
    background: #7A5C3A;
    border-radius: 0 0 3px 3px;
    z-index: 3;
    transition: background 2s;
  z-index:3;transition:background 2s;
}
#sc.night #winSill{background:#3A2E50}

/* curtains */
#curtL,#curtR{
  position: absolute;
    top: 27px;
    width: 55px;
    border-radius: 2px;
    z-index: 4;
    transition: filter 2s;
}
#curtL{
  left: calc(50% - 325px);
    height: 390px;
    background: repeating-linear-gradient(180deg, #C4A882, #B89870 28px);
}
#curtR{
  right: calc(50% - 325px);
    height: 390px;
    background: repeating-linear-gradient(180deg, #C4A882, #B89870 28px);
}
#sc.night #curtL,#sc.night #curtR{filter:brightness(.45) hue-rotate(20deg)}

/* ── LAMP GLOW — cone downward ── */
#lampCone{
  position: absolute;
    bottom: 195px;
    right: calc(50% - 150px);
    width: 0;
    height: 0;
    border-left: 90px solid transparent;
    border-right: 90px solid transparent;
    border-top: 200px solid rgba(245, 200, 66, 0);
    filter: blur(24px);
    pointer-events: none;
    transition: border-top-color 2s;
    z-index: 3;
    rotate: 180deg;
}
#sc.night #lampCone{border-top-color:rgba(245,200,66,.45)}

#deskGlow{
  position: absolute;
    bottom: 205px;
    right: calc(50% - 150px);
    width: 200px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(245, 200, 66, 0), transparent 70%);
    pointer-events: none;
    transition: background 2s;
    z-index: 2;
}
#sc.night #deskGlow{
  background:radial-gradient(ellipse,rgba(245,200,66,.25) 0%,transparent 70%);
}

/* room ambient — night overlay tint */
#nightVeil{
  position:absolute;inset:0;
  background:rgba(20,15,40,0);
  pointer-events:none;z-index:6;
  transition:background 2s;
}
#sc.night #nightVeil{    background: rgba(38, 19, 58, 0.38);}

/* ── DESK ── */
#desk{
  position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 130px;
    background: #3D2B1F;
    border-radius: 3px 3px 0 0;
    box-shadow: 0 4px 0 #251A10, 0 8px 0 #1C1208;
    transition: background .6s;
}
#deskSurface{
  height:18px;background:#8B5E3C;
  border-radius:3px 3px 0 0;
  position:relative;
  box-shadow:0 3px 0 #6B4428,0 6px 0 #5A3820;
  transition:background 2s;
}
#sc.night #deskSurface{background:#4A3020}
#deskBody{
      height: 112px;
    background: #7A5230;
    position: relative;
    transition: background 2s;
}
#sc.night #deskBody{background:#2E1C0E}
#deskBody::before{
  content: '';
    position: absolute;
    bottom: -50px;
    width: 14px;
    height: 50px;
    background: #2B1A0F;
    border-radius: 0 0 2px 2px;
    left: 24px;
}
#deskBody::after{
      content: '';
    position: absolute;
    bottom: -50px;
    width: 14px;
    height: 50px;
    background: #2B1A0F;
    border-radius: 0 0 2px 2px;
    right: 24px;
}
#legL,#legR{
  position:absolute;bottom:-52px;width:16px;height:52px;
  background:#6B4428;border-radius:0 0 3px 3px;
  transition:background 2s;
}
#sc.night #legL,#sc.night #legR{background:#2A1608}
#legL{left:22px}#legR{right:22px}

/* ── OBJECTS ── */
#objs{
      position: absolute;
    bottom: 225px;
    left: 50%;
    transform: translateX(-50%);
    width: 490px;
    height: 110px;
    z-index: 5;
}

/* BOOKS */
#books{
  position:absolute;left:6px;bottom:0;
  display:flex;align-items:flex-end;gap:2px;
}
.bk{
  border-radius:1px 1px 0 0;
  transition:filter 2s;
}
#sc.night .bk{filter:brightness(.4) saturate(.7)}

/* PENCIL CUP */
#pcup{
  position:absolute;left:110px;bottom:0;
  transition:filter 2s;
}
#sc.night #pcup{filter:brightness(.38)}
#cupBody{
  width:26px;height:30px;background:#D4A96A;
  border-radius:2px 2px 4px 4px;
  clip-path:polygon(5% 0%,95% 0%,100% 100%,0% 100%);
  position:relative;
}
#cupBody::before{content:'';position:absolute;top:-4px;left:-2px;right:-2px;height:5px;background:#C09050;border-radius:1px}
.pn{
  position:absolute;width:5px;border-radius:1px 1px 0 0;
  bottom:30px;transition:filter 2s;
}
#sc.night .pn{filter:brightness(.4)}
#pn1{left:110px;height:52px;background:#F0D840;transform:rotate(-6deg);transform-origin:bottom center}
#pn2{left:117px;height:45px;background:#C4512A;transform:rotate(2deg);transform-origin:bottom center}
#pn3{left:123px;height:58px;background:#E8D5B0;transform:rotate(-1deg);transform-origin:bottom center}

/* OPEN BOOK */
#obook{
  position:absolute;left:158px;bottom:0;
  transition:filter 2s;
}
#sc.night #obook{filter:brightness(.32)}
#bkL,#bkR{
  display:inline-block;vertical-align:bottom;
  width:44px;height:30px;
  background:#F0E6C8;border:1px solid #C8B898;
}
#bkL{border-radius:2px 0 0 2px;transform:rotate(-2deg);transform-origin:right bottom}
#bkR{border-radius:0 2px 2px 0;transform:rotate(2deg);transform-origin:left bottom}
#bkL::after,#bkR::after{
  content:'';position:absolute;top:5px;left:4px;right:4px;height:1px;
  background:rgba(139,107,74,.22);
  box-shadow:0 5px 0 rgba(139,107,74,.18),0 10px 0 rgba(139,107,74,.14),0 15px 0 rgba(139,107,74,.10);
}
#bkL,#bkR{position:relative}
#bkSpine{display:inline-block;vertical-align:bottom;width:5px;height:32px;background:#8B5E3C;border-radius:1px}

/* PAPER STACK */
#pstack{
  position:absolute;left:252px;bottom:0;
  transition:filter 2s;
}
#sc.night #pstack{filter:brightness(.3)}
.sh{
  position:absolute;bottom:0;width:48px;height:34px;
  background:#F0E6C8;border:1px solid rgba(139,107,74,.28);border-radius:1px;
}

/* MUG */
#mugG{
  position:absolute;right:58px;bottom:0;
  transition:filter 2s;
}
#sc.night #mugG{filter:brightness(.45)}
#saucer{width:50px;height:6px;background:#B89870;border-radius:50%;margin:0 auto}
#mugB{
  width:38px;height:42px;background:#7A8C6E;
  border-radius:4px 4px 5px 5px;
  margin:0 auto;position:relative;
}
#mugB::before{content:'';position:absolute;top:-4px;left:-2px;right:-2px;height:7px;background:#8BA07A;border-radius:2px}
#mugB::after{content:'';position:absolute;top:9px;left:4px;right:4px;height:5px;background:rgba(255,255,255,.14);border-radius:1px}
#mhandle{
  position:absolute;right:-12px;top:8px;
  width:13px;height:19px;
  border:3.5px solid #7A8C6E;border-radius:0 10px 10px 0;border-left:none;
}
.stm{
  position:absolute;font-size:10px;color:#C2A882;
  opacity:0;transition:opacity 1.5s;
  animation:stmRise 2.8s ease-in-out infinite;
}
#sc.night .stm{opacity:.55}
#st1{bottom:48px;left:6px;animation-delay:0s}
#st2{bottom:48px;left:20px;animation-delay:1s}
@keyframes stmRise{
  0%{transform:translateY(0);opacity:0}
  40%{opacity:.7}
  100%{transform:translateY(-16px);opacity:0}
}

/* PLANT */
#plantG{
  position:absolute;right:114px;bottom:0;
  transition:filter 2s;
}
#sc.night #plantG{filter:brightness(.38) saturate(.7)}
#potBody{
  width:34px;height:28px;background:#C4512A;
  border-radius:2px 2px 6px 6px;
  clip-path:polygon(5% 0%,95% 0%,100% 100%,0% 100%);
  position:relative;
}
#potBody::before{content:'';position:absolute;top:-5px;left:-3px;right:-3px;height:7px;background:#A8431F;border-radius:2px}
#potSoil{position:absolute;top:3px;left:5px;right:5px;height:6px;background:#3D2B1F;border-radius:1px}

/* ── LAMP (fixed, attached to desk) ── */
#lampWrap{
  position: absolute;
    right: 174px;
    bottom: 0;
    width: 44px;
    cursor: pointer;
    z-index: 7;
    transition: filter 2s;
}
#sc.night #lampWrap{filter:brightness(.9)}
#lBase{
  position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 7px;
    background: #5C4030;
    border-radius: 3px;
}
#lPost{
  position: absolute;
    bottom: 5px;
    left: 50%;
    width: 5px;
    height: 72px;
    background: #6B4A30;
    border-radius: 3px;
    transform: translateX(-50%);
}
/* elbow */
#lElbow{
  position: absolute;
    bottom: 73px;
    left: 50%;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #5C4030;
    transform: translateX(-50%);
}
/* arm going right and up */
#lArm{
  position: absolute;
    bottom: 77px;
    left: calc(50% + 0px);
    width: 5px;
    height: 52px;
    background: #6B4A30;
    border-radius: 3px;
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(30deg);
}
/* shade */
#lShade{
      position: absolute;
    bottom: 117px;
    left: calc(50% + 23px);
    width: 52px;
    height: 20px;
    background: #C4512A;
    border-radius: 22px 22px 3px 3px;
    transform: translateX(-50%) rotate(28deg);
    transform-origin: center bottom;
    pointer-events: none;
}
#lShade::after{
  content:'';
  position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:9px;height:9px;border-radius:50%;
  background:#F5C842;
  box-shadow:0 0 0 rgba(245,200,66,0);
  opacity:0;
  transition:opacity 2s,box-shadow 2s;
}
#sc.night #lShade::after{
  opacity:1;
  box-shadow:0 0 18px 8px rgba(245,200,66,.7);
}
#lHint{
  position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: white;
    letter-spacing: .06em;
    white-space: nowrap;
    opacity: .6;
    transition: opacity .5s;
}

/* NOTE on wall */
#noteWall{
  position: absolute;
    top: 115px;
    left: 84%;
    transform: translateX(-48%) rotate(-1.5deg);
    width: 150px;
    height: 110px;
    background: #F0E6C8;
    padding: 10px 10px 14px;
    box-shadow: 2px 3px 14px rgba(0, 0, 0, .22);
    z-index: 4;
    transition: box-shadow 2s, filter 2s;
}
#sc.night #noteWall{
  box-shadow:2px 3px 22px rgba(0,0,0,.6),0 0 28px rgba(245,200,66,.06);
  filter:brightness(.85);
}
#noteWall::before{
  content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:13px;height:13px;border-radius:50%;
  background:#C4512A;box-shadow:0 2px 4px rgba(0,0,0,.35);
}
#noteWall::after{
  content:'';position:absolute;bottom:10px;left:10px;right:10px;
  height:1px;background:rgba(196,81,42,.2);
  box-shadow:0 -6px 0 rgba(196,81,42,.12);
}
#noteWall .nn{
      font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(4rem, 4vw, 4rem);
    line-height: 1;
    color: #2C2418;
    text-align: center;
    display: block;
}
#noteWall .ns{
  font-size: 10px;
    color: #8B6B4A;
    letter-spacing: .13em;
    text-transform: uppercase;
    text-align: center;
    display: block;
    margin-top: 5px;
}

/* caption */
#caption{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#8B6B4A;letter-spacing:.1em;
  white-space:nowrap;z-index:8;
  transition:color 2s;
}
#sc.night #caption{color:#6858A0}
</style>

    </div>

  </div><!-- /objs -->

  <p id="caption">Cette page n'existe pas encore — ou plutôt, elle existe pour ne rien faire de sérieux. C'est un bac à sable.</p>
</div>

<script>
(function(){
  const sc  = document.getElementById('sc');
  const lw  = document.getElementById('lampWrap');
  const hint = document.getElementById('lHint');
  let lit = false;

  function toggle(){
    lit = !lit;
    sc.classList.toggle('night', lit);
    hint.textContent = lit ? 'éteindre' : 'allumer';
  }

  lw.addEventListener('click', toggle);
  lw.addEventListener('touchstart', e=>{ e.preventDefault(); toggle(); }, {passive:false});

  /* note drop entrance */
  const note = document.getElementById('noteWall');
  note.style.transition = 'transform 1s cubic-bezier(.34,1.56,.64,1), opacity .8s';
  note.style.opacity = '0';
  note.style.transform += ' translateY(-22px)';
  setTimeout(()=>{
    note.style.opacity = '1';
    note.style.transform = note.style.transform.replace(' translateY(-22px)','');
  }, 250);
})();
</script>
</body></html>
